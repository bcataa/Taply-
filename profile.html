<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" id="themeColorMeta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Link in Bio – Taply</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <meta name="description" content="Link in bio page – one link for all your content. Free." />
    <meta property="og:title" content="Link in Bio – Taply" />
    <meta property="og:description" content="One link for everything. View my links." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body id="profilePage">
    <script>
      (function(){var q=new URLSearchParams(window.location.search);if(q.get("preview")==="1"||q.get("embed")==="1"){document.documentElement.classList.add("profile-embed","profile-embed-loading");}})();
    </script>
    <header class="live-header">
      <a href="/landing" class="live-logo-link" aria-label="Open Taply home">
        <img src="/favicon.svg" alt="" class="live-logo-img" width="24" height="24" />
        <span class="live-logo-text">Taply</span>
      </a>
    </header>
    <script src="subdomain-config.js"></script>
    <div class="live-page-wrap" id="livePageWrap">
      <div class="live-profile" id="liveProfile">
        <div class="live-hero-half" id="liveHeroHalf" hidden aria-hidden="true">
          <div class="live-hero-fade"></div>
          <h1 class="live-name live-name-hero" id="liveNameHero"></h1>
          <img class="live-title-logo" id="liveTitleLogo" alt="" hidden />
        </div>
        <div class="live-classic-header" id="liveClassicHeader">
          <div class="live-avatar-wrap">
            <img class="live-avatar" id="liveAvatar" src="" alt="" />
            <div class="live-avatar-placeholder" id="liveAvatarPlaceholder"></div>
          </div>
          <h1 class="live-name" id="liveName">Name</h1>
          <img class="live-title-logo live-title-logo-classic" id="liveTitleLogoClassic" alt="" hidden />
        </div>
        <p class="live-bio" id="liveBio"></p>
        <div class="live-social live-social-icons-only" id="liveSocial" aria-label="Social links"></div>
        <div class="live-profile-urls" id="liveProfileUrls"></div>
        <div class="live-links" id="liveLinks"></div>
      </div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var username = params.get("u");
        var isEmbed = params.get("embed") === "1";
        var isPreview = params.get("preview") === "1";
        var isLivePhone = params.get("live") === "1";
        if (isEmbed || isPreview) {
          document.body.classList.add("profile-embed");
          var header = document.querySelector(".live-header");
          if (header) header.style.display = "none";
        }
        if (!username && window.SUBDOMAIN_DOMAIN) {
          var h = window.location.hostname || "";
          if (h.endsWith("." + window.SUBDOMAIN_DOMAIN) && h !== window.SUBDOMAIN_DOMAIN) {
            var first = h.split(".")[0];
            if (first && first.toLowerCase() !== "www") username = first;
          }
        }
        var apiBase = window.location.origin;
        var LOCAL_PREVIEW_STORAGE_KEY = "taply_profile";

        // Mod „live” pentru telefon: dacă deschizi linkul cu ?live=1 pe telefon,
        // pagina se reîncarcă automat la fiecare câteva secunde ca să vezi schimbările fără să tragi manual.
        if (isLivePhone && !isPreview && !isEmbed) {
          setInterval(function () {
            try {
              // Folosim reload fără cache agresiv ca să prindem modificările imediat.
              window.location.reload();
            } catch (e) {}
          }, 3000);
        }

        function renderFromApi(profile) {
          if (!profile) return;
          document.documentElement.classList.remove("profile-embed-loading");
          var wrap = document.getElementById("livePageWrap");
          if (!wrap) return;
          var theme = profile.theme || "midnight";
          document.body.classList.add("live-page", "theme-" + theme);
          wrap.classList.add("live-page", "theme-" + theme);
          var themeColors = { midnight: "#0a0a0a", sunset: "#e46e47", grid: "#5b2c2c", ivory: "#f5ede1", forest: "#0b2b26", minimal: "#f1f1f3", leather: "#3d3428", purple: "#2d1b4e" };
          var meta = document.getElementById("themeColorMeta");
          if (meta && themeColors[theme]) meta.setAttribute("content", themeColors[theme]);
          if (profile.customBackgroundImage) {
            document.body.classList.add("has-custom-bg");
            var pos = profile.customBackgroundPosition || "center center";
            var zoom = typeof profile.customBackgroundZoom === "number" ? profile.customBackgroundZoom : 100;
            var bgSize = zoom <= 100 ? "cover" : (zoom + "% " + zoom + "%");
            document.body.style.background = "transparent";
            document.body.style.backgroundImage = "url(" + profile.customBackgroundImage + ")";
            document.body.style.backgroundSize = bgSize;
            document.body.style.backgroundPosition = pos;
            document.body.style.backgroundRepeat = "no-repeat";
            document.body.style.backgroundAttachment = "scroll";
            wrap.style.background = "transparent";
            wrap.style.backgroundImage = "none";
          } else {
            document.body.classList.remove("has-custom-bg");
            document.body.style.background = "";
            document.body.style.backgroundImage = "";
            document.body.style.backgroundSize = "";
            document.body.style.backgroundPosition = "";
            document.body.style.backgroundRepeat = "";
            wrap.style.background = "";
            wrap.style.backgroundImage = "";
            wrap.style.backgroundSize = "";
            wrap.style.backgroundPosition = "";
            wrap.style.backgroundRepeat = "";
          }

          var design = profile.design || {};
          var headerLayout = design.headerLayout || "classic";
          var titleStyle = design.titleStyle || "text";
          var titleSize = design.titleSize || "small";
          var titleColor = design.titleColor || "#362630";
          var titleLogoUrl = design.titleLogoUrl || "";
          var titleFont = design.titleFont || "DM Sans";
          var alternativeTitleFont = !!design.alternativeTitleFont;
          var isHero = headerLayout === "hero";
          var pageBg = themeColors[theme] || "#f5ede1";
          var liveProfileEl = document.getElementById("liveProfile");
          var liveHeroHalf = document.getElementById("liveHeroHalf");
          var liveClassicHeader = document.getElementById("liveClassicHeader");
          if (liveProfileEl) {
            liveProfileEl.classList.toggle("live-header-layout-hero", isHero);
            liveProfileEl.classList.toggle("live-header-layout-classic", !isHero);
          }
          if (wrap) wrap.classList.toggle("is-hero-layout", isHero);
          if (liveHeroHalf) {
            liveHeroHalf.hidden = !isHero;
            liveHeroHalf.setAttribute("aria-hidden", isHero ? "true" : "false");
            if (isHero) {
              var heroBg = profile.avatar || "";
              liveHeroHalf.style.backgroundImage = heroBg
                ? "url(" + heroBg + ")"
                : "none";
              liveHeroHalf.style.backgroundColor = heroBg ? "transparent" : pageBg;
            }
          }
          if (liveClassicHeader) liveClassicHeader.hidden = isHero;
          if (wrap) wrap.style.setProperty("--live-page-bg", pageBg);
          var liveAvatar = document.getElementById("liveAvatar");
          var liveAvatarPlaceholder = document.getElementById("liveAvatarPlaceholder");
          if (profile.avatar) {
            liveAvatar.src = profile.avatar;
            liveAvatar.alt = profile.displayName || "Avatar";
            liveAvatar.hidden = false;
            liveAvatarPlaceholder.hidden = true;
          } else {
            liveAvatar.hidden = true;
            liveAvatarPlaceholder.hidden = false;
          }
          var displayTitle = profile.displayName || profile.username || "Name";
          var liveName = document.getElementById("liveName");
          var liveNameHero = document.getElementById("liveNameHero");
          var liveTitleLogo = document.getElementById("liveTitleLogo");
          var liveTitleLogoClassic = document.getElementById("liveTitleLogoClassic");
          if (alternativeTitleFont && titleFont) {
            var existing = document.getElementById("profileTitleFontLink");
            if (existing) existing.remove();
            var link = document.createElement("link");
            link.id = "profileTitleFontLink";
            link.rel = "stylesheet";
            link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(titleFont).replace(/%20/g, "+") + ":wght@400;600;700&display=swap";
            document.head.appendChild(link);
          }
          function applyTitleColorSize(el) {
            if (!el) return;
            el.style.color = titleColor;
            if (alternativeTitleFont && titleFont) el.style.fontFamily = titleFont + ", sans-serif";
            el.classList.toggle("live-name-size-large", titleSize === "large");
          }
          if (titleStyle === "logo" && titleLogoUrl) {
            if (liveName) liveName.hidden = true;
            if (liveNameHero) liveNameHero.hidden = true;
            if (liveTitleLogo) { liveTitleLogo.src = titleLogoUrl; liveTitleLogo.loading = "lazy"; liveTitleLogo.hidden = false; liveTitleLogo.classList.toggle("live-title-logo-large", titleSize === "large"); }
            if (liveTitleLogoClassic) { liveTitleLogoClassic.src = titleLogoUrl; liveTitleLogoClassic.loading = "lazy"; liveTitleLogoClassic.hidden = false; liveTitleLogoClassic.classList.toggle("live-title-logo-large", titleSize === "large"); }
          } else {
            if (liveName) { liveName.textContent = displayTitle; liveName.hidden = false; applyTitleColorSize(liveName); }
            if (liveNameHero) { liveNameHero.textContent = displayTitle; liveNameHero.hidden = false; applyTitleColorSize(liveNameHero); }
            if (liveTitleLogo) liveTitleLogo.hidden = true;
            if (liveTitleLogoClassic) liveTitleLogoClassic.hidden = true;
          }
          var bioEl = document.getElementById("liveBio");
          if (profile.bio) {
            bioEl.textContent = profile.bio;
            bioEl.hidden = false;
          } else {
            bioEl.hidden = true;
          }

          var allSocial = (profile.socialLinks || []).filter(function (e) { return e.enabled !== false; });
          if (allSocial.length === 0 && (profile.platforms || []).length > 0) {
            allSocial = (profile.platforms || []).map(function (key) { return { platform: key, url: (profile.socialUrls || {})[key] || "#" }; });
          }
          var stripLinks = allSocial.filter(function (e) { return e.origin === "strip"; });
          var addLinks = allSocial.filter(function (e) { return e.origin !== "strip"; });
          var simpleIconsCdn = "https://cdn.simpleicons.org";
          var platformSlugs = { instagram: "instagram", whatsapp: "whatsapp", tiktok: "tiktok", youtube: "youtube", website: "globe", spotify: "spotify", threads: "threads", facebook: "facebook", x: "x", soundcloud: "soundcloud", snapchat: "snapchat", pinterest: "pinterest", steam: "steam", telegram: "telegram", discord: "discord", twitch: "twitch", email: "gmail" };
          var platformLabelsPub = { instagram: "Instagram", whatsapp: "WhatsApp", tiktok: "TikTok", youtube: "YouTube", website: "Website", spotify: "Spotify", threads: "Threads", facebook: "Facebook", x: "X", soundcloud: "SoundCloud", snapchat: "Snapchat", pinterest: "Pinterest", steam: "Steam", telegram: "Telegram", discord: "Discord", twitch: "Twitch", email: "Email" };
          var socialEl = document.getElementById("liveSocial");
          if (socialEl) {
            if (stripLinks.length > 0) {
              socialEl.hidden = false;
              socialEl.innerHTML = "";
              stripLinks.forEach(function (entry) {
                var key = (entry.platform || "").toLowerCase();
                var url = (entry.url || "").trim();
                var hasUrl = url && url !== "#";
                var slug = platformSlugs[key];
                var label = platformLabelsPub[key] || key;
                var el = hasUrl ? document.createElement("a") : document.createElement("span");
                if (hasUrl) { el.href = url; el.target = "_blank"; el.rel = "noopener"; }
                el.className = "live-social-icon-btn";
                el.setAttribute("aria-label", label);
                if (slug) {
                  var img = document.createElement("img");
                  img.src = simpleIconsCdn + "/" + slug;
                  img.alt = "";
                  img.className = "live-social-icon-btn-img";
                  img.loading = "lazy";
                  el.appendChild(img);
                } else {
                  var span = document.createElement("span");
                  span.className = "live-social-icon-btn-letter";
                  span.textContent = label.charAt(0);
                  el.appendChild(span);
                }
                socialEl.appendChild(el);
              });
            } else {
              socialEl.hidden = true;
            }
          }
          var profileUrlsEl = document.getElementById("liveProfileUrls");
          if (profileUrlsEl && addLinks.length > 0) {
            profileUrlsEl.hidden = false;
            profileUrlsEl.innerHTML = "";
            addLinks.forEach(function (entry) {
              var key = (entry.platform || "").toLowerCase();
              var url = (entry.url || "").trim();
              var hasUrl = url && url !== "#";
              var slug = platformSlugs[key];
              var label = platformLabelsPub[key] || key;
              var el = hasUrl ? document.createElement("a") : document.createElement("span");
              if (hasUrl) { el.href = url; el.target = "_blank"; el.rel = "noopener"; }
              el.className = "live-link live-link-with-logo live-social-profile-link live-profile-url-link" + (hasUrl ? "" : " live-social-icon-only");
              var logoWrap = document.createElement("span");
              logoWrap.className = "live-link-logo";
              if (slug) {
                var logoImg = document.createElement("img");
                logoImg.src = simpleIconsCdn + "/" + slug;
                logoImg.alt = "";
                logoImg.className = "live-link-logo-img";
                logoImg.loading = "lazy";
                logoWrap.appendChild(logoImg);
              } else {
                logoWrap.classList.add("live-link-logo-placeholder");
                logoWrap.textContent = label.charAt(0);
              }
              var textWrap = document.createElement("span");
              textWrap.className = "live-link-text";
              var titleSpan = document.createElement("span");
              titleSpan.className = "live-link-title";
              titleSpan.textContent = label;
              textWrap.appendChild(titleSpan);
              el.appendChild(logoWrap);
              el.appendChild(textWrap);
              profileUrlsEl.appendChild(el);
            });
          } else if (profileUrlsEl) {
            profileUrlsEl.hidden = true;
          }

          var linkIconSlugs = { youtube: "youtube", instagram: "instagram", tiktok: "tiktok", website: "globe", spotify: "spotify", steam: "steam", telegram: "telegram", discord: "discord", twitch: "twitch", link: "link" };
          function linkDomain(url) {
            try { return new URL(url).hostname.replace(/^www\./, ""); } catch (e) { return ""; }
          }
          var links = (profile.links || []).filter(function (l) {
            var t = (l.title || "").toLowerCase();
            return t.indexOf("made with taply") === -1;
          });
          var linksEl = document.getElementById("liveLinks");
          links.forEach(function (link) {
            if (link.type === "section") {
              var sectionDiv = document.createElement("div");
              sectionDiv.className = "live-section-title";
              sectionDiv.textContent = link.title || "Section";
              linksEl.appendChild(sectionDiv);
              return;
            }
            var a = document.createElement("a");
            a.href = link.url;
            a.target = "_blank";
            a.rel = "noopener";
            a.className = "live-link" + (link.highlight ? " is-highlight" : "");
            if (link.type === "image" && link.imageUrl) {
              var img = document.createElement("img");
              img.src = link.imageUrl;
              img.alt = link.title || "";
              img.className = "live-link-image";
              img.loading = "lazy";
              a.appendChild(img);
            } else {
              a.className = a.className + " live-link-with-logo";
              var logoWrap = document.createElement("span");
              logoWrap.className = "live-link-logo";
              var slug = link.icon && linkIconSlugs[link.icon];
              if (slug) {
                var logoImg = document.createElement("img");
                logoImg.src = simpleIconsCdn + "/" + slug;
                logoImg.alt = "";
                logoImg.className = "live-link-logo-img";
                logoImg.loading = "lazy";
                logoWrap.appendChild(logoImg);
              } else {
                logoWrap.classList.add("live-link-logo-placeholder");
                logoWrap.textContent = (link.title || "Link").charAt(0);
              }
              var textWrap = document.createElement("span");
              textWrap.className = "live-link-text";
              var titleSpan = document.createElement("span");
              titleSpan.className = "live-link-title";
              titleSpan.textContent = link.title || "Link";
              var subSpan = document.createElement("span");
              subSpan.className = "live-link-subtitle";
              subSpan.textContent = "";
              textWrap.appendChild(titleSpan);
              a.appendChild(logoWrap);
              a.appendChild(textWrap);
            }
            a.addEventListener("click", function () {
              if (isPreview || !username) return;
              fetch(apiBase + "/api/profile/" + encodeURIComponent(username) + "/click", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ linkId: link.id })
              }).catch(function () {});
            });
            linksEl.appendChild(a);
          });
        }

        function renderFromLocalStorage() {
          try {
            var raw = localStorage.getItem(LOCAL_PREVIEW_STORAGE_KEY);
            if (!raw) return showEmpty();
            var profile = JSON.parse(raw);
            if (!profile || typeof profile !== "object") return showEmpty();
            renderFromApi(profile);
          } catch (e) {
            showEmpty();
          }
        }

        function showEmpty() {
          if (isPreview) return;
          var liveProfile = document.getElementById("liveProfile");
          if (liveProfile) liveProfile.innerHTML = "<p class='live-empty'>Profile not found or invalid link. <a href='/dashboard' target='_top'>Taply</a></p>";
          document.body.classList.add("live-page", "theme-minimal");
          var wrap = document.getElementById("livePageWrap");
          if (wrap) wrap.classList.add("live-page", "theme-minimal");
        }

        if (isPreview) {
          var hasPreviewData = false;
          var previewPingTimer = null;
          // In preview mode, render only from parent messages (faster, no API dependency).
          window.addEventListener("message", function (event) {
            if (!event || !event.data) return;
            if (event.data.type === "taply-preview-data" && event.data.profile) {
              hasPreviewData = true;
              if (previewPingTimer) { clearInterval(previewPingTimer); previewPingTimer = null; }
              renderFromApi(event.data.profile);
              return;
            }
            if (event.data.type === "taply-preview-refresh") {
              // Backward-compat fallback: if no data arrives, try local storage.
              renderFromLocalStorage();
            }
          });
          try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: "taply-preview-ready" }, "*"); } catch (e) {}
          previewPingTimer = setInterval(function () {
            if (hasPreviewData) return;
            try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: "taply-preview-ready" }, "*"); } catch (e) {}
          }, 700);
          // Fallback only if parent messages don't arrive.
          setTimeout(function () { if (!hasPreviewData) renderFromLocalStorage(); }, 900);
        } else if (username) {
          fetch(apiBase + "/api/profile/" + encodeURIComponent(username) + "?_=" + Date.now())
            .then(function (r) {
              if (!r.ok) throw new Error();
              return r.json();
            })
            .then(function (profile) {
              fetch(apiBase + "/api/profile/" + encodeURIComponent(username) + "/view", { method: "POST" }).catch(function () {});
              renderFromApi(profile);
            })
            .catch(showEmpty);
        } else {
          showEmpty();
        }
      })();
    </script>
  </body>
</html>
